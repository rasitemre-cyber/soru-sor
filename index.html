<!-- ══ PDF.js PARSER (e-Okul format) ══ -->
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const COL_BOUNDS = [0,107,177,247,322,392,462,535,600];
function getCol(x){for(let i=0;i<COL_BOUNDS.length-1;i++)if(x>=COL_BOUNDS[i]&&x<COL_BOUNDS[i+1])return i;return -1;}

async function parsePage(page){
  const pageH=page.view[3],scale=1.5,vp=page.getViewport({scale});
  const cvs=document.createElement('canvas');cvs.width=vp.width;cvs.height=vp.height;
  await page.render({canvasContext:cvs.getContext('2d'),viewport:vp}).promise;
  const tc=await page.getTextContent();
  const TOL=4,rcm={},ryReal={};
  tc.items.forEach(item=>{
    const s=item.str;if(!s.trim())return;
    const x=item.transform[4],yPdf=item.transform[5];
    const yTop=Math.round((pageH-yPdf)/TOL)*TOL,col=getCol(x);
    if(col<0)return;
    if(!rcm[yTop]){rcm[yTop]={};ryReal[yTop]=pageH-yPdf;}
    if(!rcm[yTop][col])rcm[yTop][col]=[];
    rcm[yTop][col].push({x,s});
  });
  const sYs=Object.keys(rcm).map(Number).sort((a,b)=>a-b);
  const rd={};
  sYs.forEach(y=>{rd[y]={};Object.entries(rcm[y]).forEach(([c,pts])=>{rd[y][parseInt(c)]=pts.sort((a,b)=>a.x-b.x).map(p=>p.s).join('');});});

  let className=null,schoolName='';
  for(const y of sYs.slice(0,8)){
    const line=Object.values(rd[y]).join(' ').replace(/\s+/g,' ').trim();
    if(!schoolName&&(line.includes('Müdürlüğü')||line.includes('Okulu')))
      schoolName=line.replace(/.*\/\s*/,'').replace(/\s*[Mm]üdürlüğü.*/i,'').trim();
    const cm=line.match(/(\d+)\.\s*S[iı]n[iı]f\s*[\/\s]+([A-ZÇĞİÖŞÜ])\s*[Şş]ubesi/i);
    if(cm){className=`${cm[1]}. Sınıf / ${cm[2].toUpperCase()} Şubesi`;break;}
  }
  if(!className)return null;

  const isNum=s=>/^\d{1,4}$/.test(s.trim());
  const isName=s=>/^[A-ZÇĞİÖŞÜa-zçğışöü\s]{2,50}$/.test(s.trim())&&/[A-ZÇĞİÖŞÜ]/.test(s);
  const ci=Array.from({length:8},()=>[]);
  sYs.forEach(y=>{if(y<100)return;Object.entries(rd[y]).forEach(([c,val])=>{const col=parseInt(c),v=val.trim();if(!v)return;if(isNum(v))ci[col].push({y,val:v,type:'num'});else if(isName(v))ci[col].push({y,val:v,type:'name'});});});

  const all=[];
  ci.forEach((items,col)=>{
    const sorted=[...items].sort((a,b)=>a.y-b.y);let nb='',ny=null;
    sorted.forEach(({y,val,type})=>{
      if(type==='name'){nb=nb?nb+' '+val:val;if(ny===null)ny=y;}
      else if(type==='num'&&nb.trim().length>2){all.push({rowY:ny,col,name:nb.trim(),number:val});nb='';ny=null;}
      else if(type==='num'){nb='';ny=null;}
    });
  });
  all.sort((a,b)=>a.rowY!==b.rowY?a.rowY-b.rowY:a.col-b.col);
  if(!all.length)return null;

  const PX_FIRST=98,PX_STEP=106,PY_FIRST=137,PY_STEP=139,PW=48,PH=80;
  const uRYs=[...new Set(all.map(s=>Math.round(s.rowY/10)*10))].sort((a,b)=>a-b);
  const ryIdx={};uRYs.forEach((y,i)=>{ryIdx[Math.round(y/10)*10]=i;});
  const students=all.map(st=>{
    const ri=ryIdx[Math.round(st.rowY/10)*10]??0,ci2=st.col;
    const px=PX_FIRST+ci2*PX_STEP,py=PY_FIRST+ri*PY_STEP;
    let photoData=null;
    if(px+PW<=cvs.width&&py+PH<=cvs.height){
      const t=document.createElement('canvas');t.width=PW;t.height=PH;
      t.getContext('2d').drawImage(cvs,px,py,PW,PH,0,0,PW,PH);
      photoData=t.toDataURL('image/jpeg',0.85);
    }
    return{name:st.name,number:st.number,photoData};
  });
  return{name:className,school:schoolName,students};
}

window.parsePDF=async function(file,onProgress){
  const pdf=await pdfjsLib.getDocument({data:await file.arrayBuffer()}).promise;
  const total=pdf.numPages;const classes=[];let schoolName='';
  for(let p=1;p<=total;p++){
    if(onProgress)onProgress(`Sayfa ${p} / ${total} işleniyor...`);
    const cls=await parsePage(await pdf.getPage(p));
    if(!cls)continue;
    if(!schoolName&&cls.school)schoolName=cls.school;
    classes.push(cls);
  }
  return{schoolName,classes};
};
</script>

<!-- ══ KAMERA YÖNETİCİSİ ══ -->
<script>
window.CameraManager = (function(){
  let stream = null;
  let facingMode = "environment";
  let onCaptureCb = null;

  const modal  = ()=>document.getElementById("cameraModal");
  const video  = ()=>document.getElementById("camVideo");
  const canvas = ()=>document.getElementById("camCanvas");

  async function startCamera(){
    try{
      if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }
      stream = await navigator.mediaDevices.getUserMedia({
        video:{ facingMode, width:{ideal:1280}, height:{ideal:720} },
        audio:false
      });
      video().srcObject = stream;
    }catch(err){
      console.error("Kamera hatası:",err);
      alert("📷 Kamera açılamadı: "+err.message);
      closeCamera();
    }
  }

  function closeCamera(){
    if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }
    modal().classList.remove("show");
  }

  function capture(){
    const v=video(), c=canvas();
    c.width=v.videoWidth||640; c.height=v.videoHeight||480;
    c.getContext("2d").drawImage(v,0,0);
    const dataUrl = c.toDataURL("image/jpeg",0.92);
    closeCamera();
    if(onCaptureCb) onCaptureCb(dataUrl);
  }

  async function switchCamera(){
    facingMode = facingMode==="environment"?"user":"environment";
    await startCamera();
  }

  // Buton bağlantıları
  document.addEventListener("DOMContentLoaded",()=>{
    document.getElementById("camCapture").onclick = capture;
    document.getElementById("camClose").onclick   = closeCamera;
    document.getElementById("camSwitch").onclick  = switchCamera;
  });

  return {
    open: function(cb){
      onCaptureCb = cb;
      modal().classList.add("show");
      startCamera();
    }
  };
})();
</script>

/* ── Fotoğraf butonları — WebRTC + capture fallback ── */
function AskPhotoButtons({onFile,size="md"}){
  const p=size==="lg"?"16px 10px":"13px 10px";
  const fs=size==="lg"?22:20;

  const handleCapture=()=>{
    // Önce WebRTC kamerayı dene
    if(navigator.mediaDevices && navigator.mediaDevices.getUserMedia){
      window.CameraManager.open((dataUrl)=>{
        // dataUrl → File benzeri nesne
        fetch(dataUrl).then(r=>r.blob()).then(blob=>{
          const file=new File([blob],"photo.jpg",{type:"image/jpeg"});
          onFile(file);
        });
      });
    } else {
      // Fallback: input capture
      const inp=document.createElement("input");
      inp.type="file";inp.accept="image/*";
      inp.setAttribute("capture","environment");
      inp.style.cssText="position:fixed;top:-999px;left:-999px;opacity:0;pointer-events:none;";
      inp.addEventListener("change",(e)=>{
        const f=e.target.files&&e.target.files[0];
        if(f) onFile(f);
        try{document.body.removeChild(inp);}catch{}
      });
      inp.addEventListener("cancel",()=>{try{document.body.removeChild(inp);}catch{}});
      document.body.appendChild(inp);
      setTimeout(()=>inp.click(),0);
    }
  };

  const openGallery=()=>{
    const inp=document.createElement("input");
    inp.type="file";inp.accept="image/*";
    inp.style.cssText="position:fixed;top:-999px;left:-999px;opacity:0;pointer-events:none;";
    inp.addEventListener("change",(e)=>{
      const f=e.target.files&&e.target.files[0];
      if(f) onFile(f);
      try{document.body.removeChild(inp);}catch{}
    });
    inp.addEventListener("cancel",()=>{try{document.body.removeChild(inp);}catch{}});
    document.body.appendChild(inp);
    setTimeout(()=>inp.click(),0);
  };

  const btnBase={flex:1,display:"flex",alignItems:"center",justifyContent:"center",
    gap:8,padding:p,borderRadius:14,cursor:"pointer",fontWeight:700,fontSize:13,
    transition:"all .2s",userSelect:"none",outline:"none"};

  return <div style={{display:"flex",gap:8,marginBottom:8}}>
    <button type="button"
      style={{...btnBase,border:"2px dashed #c7d2fe",background:"#f8faff",color:"#6366f1"}}
      onMouseEnter={e=>{e.currentTarget.style.background="#eef2ff";e.currentTarget.style.borderColor="#6366f1";}}
      onMouseLeave={e=>{e.currentTarget.style.background="#f8faff";e.currentTarget.style.borderColor="#c7d2fe";}}
      onClick={openGallery}>
      <span style={{fontSize:fs}}>🖼️</span> Galeriden Seç
    </button>
    <button type="button"
      style={{...btnBase,border:"2px dashed #fde68a",background:"#fffbeb",color:"#d97706"}}
      onMouseEnter={e=>{e.currentTarget.style.background="#fef3c7";e.currentTarget.style.borderColor="#f59e0b";}}
      onMouseLeave={e=>{e.currentTarget.style.background="#fffbeb";e.currentTarget.style.borderColor="#fde68a";}}
      onClick={handleCapture}>
      <span style={{fontSize:fs}}>📷</span> Fotoğraf Çek
    </button>
  </div>;
}

function DrawCanvas({imgUrl,onSave}){
  const ref=useRef();
  const[drw,setDrw]=useState(false);
  const[col,setCol]=useState("#ef4444");
  const[sz,setSz]=useState(3);
  useEffect(()=>{
    const c=ref.current;if(!c)return;
    const ctx=c.getContext("2d");c.width=480;c.height=300;
    if(imgUrl){const img=new Image();img.onload=()=>ctx.drawImage(img,0,0,480,300);img.src=imgUrl;}
    else{ctx.fillStyle="#f8faff";ctx.fillRect(0,0,480,300);ctx.fillStyle="#c7d2fe";ctx.font="14px Nunito,sans-serif";ctx.textAlign="center";ctx.fillText("✏️ Çözümünüzü buraya çizin",240,150);}
  },[imgUrl]);
  const draw=useCallback(e=>{
    if(!drw)return;
    const c=ref.current;const ctx=c.getContext("2d");const r=c.getBoundingClientRect();
    ctx.strokeStyle=col;ctx.lineWidth=sz;ctx.lineCap="round";
    ctx.lineTo((e.clientX-r.left)*(c.width/r.width),(e.clientY-r.top)*(c.height/r.height));ctx.stroke();
  },[drw,col,sz]);
  const start=e=>{
    const c=ref.current;const ctx=c.getContext("2d");const r=c.getBoundingClientRect();
    ctx.beginPath();ctx.moveTo((e.clientX-r.left)*(c.width/r.width),(e.clientY-r.top)*(c.height/r.height));
    setDrw(true);
  };
  const colors=["#ef4444","#3b82f6","#10b981","#f59e0b","#8b5cf6","#ec4899","#1e1b4b"];
  return <div>
    <div style={{display:"flex",gap:5,marginBottom:9,alignItems:"center",flexWrap:"wrap"}}>
      {colors.map(c=><button key={c} onClick={()=>setCol(c)} style={{width:24,height:24,borderRadius:"50%",background:c,border:col===c?"3px solid #1e1b4b":"2px solid #e8eeff",cursor:"pointer"}}/>)}
      <div style={{display:"flex",alignItems:"center",gap:5,marginLeft:6}}>
        <span style={{fontSize:11,color:"#94a3b8"}}>Kalınlık</span>
        <input type="range" min={1} max={10} value={sz} onChange={e=>setSz(+e.target.value)} style={{width:70}}/>
        <span style={{fontSize:12,fontWeight:700,color:"#6366f1"}}>{sz}</span>
      </div>
    </div>
    <canvas ref={ref} style={{width:"100%",border:"2px solid #e8eeff",borderRadius:14,cursor:"crosshair",touchAction:"none"}}
      onMouseDown={start} onMouseMove={draw} onMouseUp={()=>setDrw(false)} onMouseLeave={()=>setDrw(false)}/>
    <div style={{display:"flex",gap:8,marginTop:9}}>
      <Btn label="💾 Kaydet" sz="sm" onClick={()=>onSave(ref.current.toDataURL("image/png"))}/>
      <Btn label="🗑 Temizle" sz="sm" v="ghost" onClick={()=>{const c=ref.current;const ctx=c.getContext("2d");ctx.clearRect(0,0,c.width,c.height);ctx.fillStyle="#f8faff";ctx.fillRect(0,0,c.width,c.height);}}/>
    </div>
  </div>;
}

          :topT.map((t,i)=><div key={t.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 2px",borderBottom:i<topT.length-1?"1px solid #f0f4ff":"none"}}>
            <span style={{width:22,textAlign:"center",fontSize:16}}>{medals[i]}</span>
            <Ava i={t.av||t.name[0]} c={t.col||"#10b981"} s={30}/>
            <div style={{flex:1}}><div style={{fontWeight:700,fontSize:13,color:"#1e1b4b"}}>{t.name}</div><div style={{fontSize:10,color:"#94a3b8"}}>{(t.branches||[]).join(", ")}</div></div>
            <span style={{fontWeight:900,fontSize:17,color:"#10b981",fontFamily:"'Baloo 2',sans-serif"}}>{t.solved||0}</span>
          </div>)}
        </div>
      </Card>
      {brs.length>0&&<Card delay={.2}>
        <div style={{fontFamily:"'Baloo 2',sans-serif",fontWeight:800,fontSize:15,color:"#312e81",marginBottom:12}}>📚 Branşa Göre</div>
        {brs.map(({b,c})=>{const cl=BC[b]||"#6366f1";return <div key={b} style={{marginBottom:9}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
            <span style={{fontSize:13,fontWeight:700,color:"#475569"}}>{BE[b]} {b}</span>
            <span style={{fontSize:13,fontWeight:900,color:cl}}>{c}</span>
          </div>
          <div style={{background:"#f0f4ff",borderRadius:99,height:7}}>
            <div style={{background:`linear-gradient(90deg,${cl},${cl}88)`,borderRadius:99,height:7,
              width:`${(c/Math.max(questions.length,1))*100}%`,transition:"width .7s ease"}}/>
          </div>
        </div>;})}
      </Card>}
    </div>
  </div>;
}

  const VAPID_PUBLIC="BKo1M0VyrmdLrbrJ5E-7lHZYRzIlXSwqG6ni-8Ksi3isW2FhBJt3UpaKhgz82sXXl13i_gRwtixrVe7_SN4JSW0";

    const pad=b64.replace(/-/g,"+").replace(/_/g,"/");
    const raw=atob(pad);
    return Uint8Array.from({length:raw.length},(_,i)=>raw.charCodeAt(i));
  };

  // Kullanıcının push subscription'ını kaydet
  const registerPush=async(u)=>{
    if(!("serviceWorker" in navigator)||!("PushManager" in window))return;

    try{
      const reg=await navigator.serviceWorker.ready;

        sub=await reg.pushManager.subscribe({
          userVisibleOnly:true,
          applicationServerKey:urlB64ToUint8(VAPID_PUBLIC)
        });
      }
      const j=sub.toJSON();
      await sb.from("push_subscriptions").upsert({
        user_id:u.id,
        kurum_kodu:u.kurum_kodu,
        role:u.role||"student",
        endpoint:j.endpoint,
        p256dh:j.keys.p256dh,
        auth:j.keys.auth

  // Ana ekrana eklenmiş mi? Badge API varsa PWA olarak yüklü demektir

  const sendPushNotif=(title,body,icon="./icon-192.png")=>{
    if(!("Notification" in window)||Notification.permission!=="granted")return;

  // ────────────────────────────────────────────────────────────

  const loadData=useCallback(async(kurumKodu,currentUser)=>{

  // Kurum kodu kontrolü — config'den gelir
  const checkKK=(kk)=>{

  /* ── PDF YÜKLEYİCİ ── */

  /* ── AUTH: GİRİŞ ── */
  const loginTeacher=async()=>{

    setLoading(true);
    // Kurum koduna göre config çek
    const cfg=await DB.getConfig(lKK.trim());
    if(!cfg&&lKK.trim()){
      // İlk giriş kontrolü: pending veya teachers'da var mı?
    }
    const ts=await DB.getTeachers(lKK.trim());
    const t=ts.find(t=>normCmp(t.name)===normCmp(lTName)&&normCmp(t.kurum_kodu)===normCmp(lKK));
    setLoading(false);
    if(!t){toast_("Öğretmen bulunamadı. Önce kayıt olun.",true);return;}
    if(hashPw(lPw)!==t.pass_hash){toast_("Şifre hatalı! 🔒",true);return;}
    if(!t.approved){toast_("Hesabın henüz admin onayı bekliyor ⏳",true);return;}

    toast_(`Hoş geldin, ${t.name.split(" ")[0]}! 👋`);

    if(granted) await registerPush(tUser);
  };

  const loginStudent=async()=>{
    if(!lName||!lNum||!lPw){toast_("Tüm alanlar zorunlu!",true);return;}
    setLoading(true);
    // Öğrencinin kurum kodunu bilmiyoruz — tüm studentlarda ara (number+name unique olmalı)
    // Ama önce kurum kodunu bulmamız gerekiyor: lKK alanı yok, o yüzden öğrenci giriş ekranına kurum kodu ekleyeceğiz
    // Şimdilik lKK state'ini kullan (öğrenci giriş formuna eklendi)
    const ss=await DB.getStudents(lKK.trim());
    const s=ss.find(st=>normCmp(st.name)===normCmp(lName)&&String(st.number)===String(lNum.trim()));
    setLoading(false);
    if(!s){
      const ps=await DB.getPending(lKK.trim());

  /* ── AUTH: KAYIT ── */
  const registerTeacher=async()=>{
    if(!rName||!rSn||!rKK||!rPw){setRErr("Tüm alanlar zorunlu ✦");return;}
    if(rPw!==rPw2){setRErr("Şifreler eşleşmiyor");return;}

    const isFirst=existingTs.length===0&&existingPs.filter(p=>p.role==="teacher").length===0;
    const t={

  const registerStudent=async()=>{
    if(!rName||!rSn||!rNum||!rKK||!rPw){setRErr("Tüm alanlar zorunlu ✦");return;}
    if(rPw!==rPw2){setRErr("Şifreler eşleşmiyor");return;}

    const kk=rKK.trim();

    // Kurum kodu geçerli mi?
    const cfg=await DB.getConfig(kk);

      setRErr("Bu kurum kodu sistemde kayıtlı değil!");setLoading(false);return;
    }

    const fullName=normName(rName+" "+rSn);
    const num=rNum.trim();

    const existingSs=await DB.getStudents(kk);
    const existingPs=await DB.getPending(kk);
    const already=[...existingSs,...existingPs].find(s=>normCmp(s.name)===normCmp(fullName)&&String(s.number)===String(num));
    if(already){setRErr("Bu öğrenci zaten kayıtlı veya onay bekliyor");setLoading(false);return;}

    // PDF eşleştirme
    const sd=await DB.getSchoolData(kk);

    for(const cls of sd.classes){
      for(const s of cls.students){

  /* ── SORU / CEVAP ── */
  const askQ=async()=>{
    if(!aF.branch||!aF.text){toast_("Branş ve soru boş olamaz!",true);return;}
    const q={id:uid(),kurum_kodu:user.kurum_kodu,
      sid:user.id,s_name:user.name,s_col:user.col||"#6366f1",s_photo:user.photo||null,
      cls:user.cls||"",branch:aF.branch,text:aF.text,img:aF.img,
      ts:new Date().toISOString(),answers:[],views:0};

    try{
      await DB.upsertQuestion(q);
    }catch(err){
      toast_("Soru gönderilemedi: "+err.message,true);return;
    }

    // DB bildirimleri + Edge Push
    const branchTeachers=teachers.filter(t=>t.branches?.includes(aF.branch)&&t.approved);
    for(const t of branchTeachers){
      await DB.addNotif({
        id:uid(),kurum_kodu:user.kurum_kodu,user_id:t.id,
        text:`Yeni ${aF.branch} sorusu ${BE[aF.branch]||""}`,
        read:false,q_id:q.id,ts:new Date().toISOString()
      });
    }
    // Öğretmenlere sunucu push gönder
    if(branchTeachers.length){
      sendEdgePush(
        branchTeachers.map(t=>t.id),
        `📚 Yeni ${aF.branch} Sorusu`,
        `${user.name}: ${aF.text.slice(0,80)}`,
        user.kurum_kodu
      );
    }

    // Toplam soru sayacını artır (silinse de azalmaz)
    const newTotalQ=(user.total_q||0)+1;
    await DB.upsertStudent({...user,total_q:newTotalQ,q_count:newTotalQ});
    setUser(p=>{const nu={...p,total_q:newTotalQ,q_count:newTotalQ};try{localStorage.setItem("sorusor_session",JSON.stringify(nu));}catch{}return nu;});
    setQuestions(prev=>[q,...prev]);
    setAF({branch:"",text:"",img:null});setTab("feed");
    toast_("Sorun havuza gönderildi! 🚀");
  };

  const answer=async()=>{
    if(!ansF.text&&!ansF.img&&!ansF.audio){toast_("En az bir format doldur!",true);return;}
    const a={id:uid(),tid:user.id,tName:user.name,tCol:user.col||"#10b981",
      text:ansF.text,img:ansF.img,audio:ansF.audio,ts:new Date().toISOString()};
    const newAnswers=[...selQ.answers,a];
    // Sadece DB kolonlarını gönder (camelCase normalize alanları çıkar)
    const uqDB={
      id:selQ.id,kurum_kodu:selQ.kurum_kodu,
      sid:selQ.sid,s_name:selQ.s_name||selQ.sName||"",
      s_col:selQ.s_col||selQ.sCol||"#6366f1",
      s_photo:selQ.s_photo||selQ.sPhoto||null,
      cls:selQ.cls||"",branch:selQ.branch,
      text:selQ.text,img:selQ.img||null,
      answers:newAnswers,views:selQ.views||0,ts:selQ.ts
    };
    try{
      await DB.upsertQuestion(uqDB);
    }catch(err){
      toast_("Cevap gönderilemedi: "+err.message,true);return;

    // Öğrenciye DB bildirimi
    await DB.addNotif({
      id:uid(),kurum_kodu:user.kurum_kodu,user_id:selQ.sid,
      text:`${user.name} sorunuzu cevapladı! ✅`,
      read:false,q_id:selQ.id,ts:new Date().toISOString()
    });
    // Öğrenciye sunucu push gönder
    sendEdgePush(
      [selQ.sid],
      `✅ Sorunuz Cevaplandı`,
      `${user.name}: ${(selQ.text||"").slice(0,60)}`,
      user.kurum_kodu
    );
    // Öğretmen çözüm sayacı
    const updT={...user,solved:(user.solved||0)+1};
    await DB.upsertTeacher(updT);
    setUser(p=>({...p,solved:(p.solved||0)+1}));
    const uqLocal={...selQ,answers:newAnswers};
    setSelQ(uqLocal);
    setQuestions(prev=>prev.map(q=>q.id===selQ.id?uqLocal:q));
    setAnsF({text:"",img:null,audio:null});setShowAns(false);
    toast_("Cevabın öğrenciye ulaştı! ✨");
  };

  const openQ=async(q)=>{
    const uqLocal={...q,views:q.views+1};
    setSelQ(uqLocal);
    history.pushState({tab,selQ:q.id},"","");
    setQuestions(prev=>prev.map(x=>x.id===q.id?uqLocal:x));
    // Sadece DB kolonlarını gönder
    const uqDB={
      id:q.id,kurum_kodu:q.kurum_kodu,
      sid:q.sid,s_name:q.s_name||q.sName||"",
      s_col:q.s_col||q.sCol||"#6366f1",
      s_photo:q.s_photo||q.sPhoto||null,

              <button onClick={()=>loadData(user.kurum_kodu,user)} style={{background:"#eef2ff",border:"none",borderRadius:10,padding:"7px 14px",cursor:"pointer",color:"#6366f1",fontWeight:700,fontSize:13,display:"flex",alignItems:"center",gap:5}}>🔄 Yenile {pending.length>0&&<span style={{background:"#ef4444",color:"#fff",borderRadius:"50%",width:18,height:18,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800}}>{pending.length}</span>}</button>
            </div>

            <Card sx={{marginBottom:14,border:"2px solid #e0e7ff",background:"linear-gradient(135deg,#fafbff,#eef2ff)"}}>
              <div style={{display:"flex",alignItems:"flex-start",gap:14,flexWrap:"wrap"}}>
                <div style={{flex:1,minWidth:200}}>
                  <div style={{fontFamily:"'Baloo 2',sans-serif",fontWeight:800,fontSize:15,color:"#312e81",marginBottom:4}}>
                    📄 e-Okul Sınıf Listesi (PDF)
                  </div>
                  {schoolData.classes.length>0
                    ?<div style={{fontSize:13,color:"#10b981",fontWeight:600}}>
                      ✅ {schoolData.schoolName} · {schoolData.classes.length} sınıf · {schoolData.classes.reduce((s,c)=>s+c.students.length,0)} öğrenci
                    </div>
                    :<div style={{fontSize:13,color:"#f59e0b",fontWeight:600}}>⚠️ Henüz yüklenmedi</div>}
                </div>
                <div>
                  <input ref={pdfInputRef} type="file" accept=".pdf" style={{display:"none"}}
                    onChange={e=>{const f=e.target.files[0];if(f){handlePdfFile(f);}e.target.value="";}}/>
                  <Btn label="📄 PDF Yükle" sz="sm" onClick={()=>pdfInputRef.current?.click()}/>
                </div>
              </div>
              {schoolData.classes.length>0&&(
                <div style={{marginTop:12,display:"flex",flexWrap:"wrap",gap:6}}>
                  {schoolData.classes.map(cls=>(
                    <div key={cls.name} style={{background:"#fff",border:"1.5px solid #e0e7ff",
                      borderRadius:10,padding:"5px 11px",fontSize:12,fontWeight:700,color:"#4338ca"}}>
                      📚 {cls.name} <span style={{color:"#94a3b8",fontWeight:600}}>({cls.students.length})</span>
                    </div>
                  ))}
                </div>
              )}
            </Card>

            {pending.length>0&&(
              <Card sx={{marginBottom:14,border:"2px solid #fde68a",background:"linear-gradient(135deg,#fffbeb,#fefce8)"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:13}}>
                  <span style={{fontSize:18}}>⏳</span>
                  <span style={{fontFamily:"'Baloo 2',sans-serif",fontWeight:800,fontSize:15,color:"#92400e"}}>
                    Onay Bekleyenler ({pending.length})
                  </span>
                </div>
                {pending.map(p=>(
                  <PendingRow key={p.id} p={p} schoolData={schoolData}
                    onApprove={async(updP)=>{
                      try{
                        // pending'den sadece hedef tabloda olan kolonları al
                        const base={id:updP.id,role:updP.role,name:updP.name,kurum_kodu:updP.kurum_kodu,
                          pass_hash:updP.pass_hash,col:updP.col,av:updP.av,approved:true,ts:updP.ts};
                        let rec;
                        if(updP.role==="teacher"){
                          rec={...base,school:updP.school||"",branches:updP.branches||[],
                            is_admin:updP.is_admin||false,solved:updP.solved||0};
                          const r=await sb.from("teachers").upsert(rec,{onConflict:"id"});
                          if(r.error)throw new Error("Öğretmen kaydı hatası: "+r.error.message);
                        }else{
                          rec={...base,number:updP.number||"",cls:updP.cls||"",school:updP.school||"",
                            photo:updP.photo||null,pdf_matched:updP.pdf_matched||false,q_count:updP.q_count||0};
                          const r=await sb.from("students").upsert(rec,{onConflict:"id"});
                          if(r.error)throw new Error("Öğrenci kaydı hatası: "+r.error.message);
                        }
                        const rd=await sb.from("pending").delete().eq("id",updP.id);
                        if(rd.error)throw new Error("Pending silme hatası: "+rd.error.message);
                        await loadData(user.kurum_kodu,user);
                        toast_(`${p.name} onaylandı! ✅`);
                      }catch(err){
                        toast_("Onay hatası: "+err.message,true);
                      }
                    }}
                    onReject={async()=>{
                      await DB.deletePending(p.id);
                      await loadData(user.kurum_kodu,user);
                      toast_("Reddedildi.");
                    }}
                  />
                ))}
              </Card>
            )}

            <Card sx={{marginBottom:14}}>
              <div style={{fontFamily:"'Baloo 2',sans-serif",fontWeight:800,fontSize:15,color:"#312e81",marginBottom:13}}>
                👥 Aktif Kullanıcılar ({teachers.filter(t=>t.approved).length+students.filter(s=>s.approved).length})
              </div>
              {[...teachers.filter(t=>t.approved),...students.filter(s=>s.approved)].map(u=>(
                <AdminUserRow key={u.id} u={u} currentUser={user}
                  teachers={teachers} students={students}
                  kurumKodu={user.kurum_kodu}
                  onRefresh={()=>loadData(user.kurum_kodu,user)}
                  toast_={toast_}/>
              ))}
            </Card>

            <Card sx={{marginBottom:14}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:13,flexWrap:"wrap",gap:8}}>
                <div style={{fontFamily:"'Baloo 2',sans-serif",fontWeight:800,fontSize:15,color:"#312e81"}}>
                  🗂 Soru Yönetimi ({questions.length} soru)
                </div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  <Btn label="Tümünü Sil" sz="sm" v="danger"
                    onClick={async()=>{
                      if(!window.confirm("Tüm sorular silinecek! Emin misiniz?"))return;
                      for(const q of questions){
                        try{await DB.deleteQuestion(q.id);}catch(e){}
                      }
                      await loadData(user.kurum_kodu,user);
                      toast_("Tüm sorular silindi 🗑");
                    }}/>
                  <Btn label="Cevaplanmışları Sil" sz="sm" v="soft"
                    onClick={async()=>{
                      const answered=questions.filter(q=>q.answers.length>0);
                      if(!answered.length){toast_("Cevaplanmış soru yok",true);return;}
                      if(!window.confirm(`${answered.length} cevaplanmış soru silinecek!`))return;
                      for(const q of answered){
                        try{await DB.deleteQuestion(q.id);}catch(e){}
                      }
                      await loadData(user.kurum_kodu,user);
                      toast_(`${answered.length} soru silindi ✅`);
                    }}/>
                </div>
              </div>
              {questions.length===0
                ?<div style={{color:"#94a3b8",fontSize:13,textAlign:"center",padding:"10px 0"}}>Henüz soru yok</div>
                :<div style={{maxHeight:280,overflowY:"auto",display:"flex",flexDirection:"column",gap:6}}>
                  {questions.map(q=>(
                    <div key={q.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",
                      background:q.answers.length>0?"#f0fdf4":"#fefce8",borderRadius:10,
                      border:`1px solid ${q.answers.length>0?"#bbf7d0":"#fde68a"}`}}>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:12,fontWeight:700,color:"#1e1b4b",overflow:"hidden",
                          textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{q.s_name||"?"} — {q.branch}</div>
                        <div style={{fontSize:11,color:"#64748b",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{q.text}</div>
                      </div>
                      <div style={{fontSize:10,color:"#94a3b8",flexShrink:0}}>{q.answers.length>0?"✅":"⏳"}</div>
                      <button onClick={async()=>{
                        if(!window.confirm("Bu soru silinecek!"))return;
                        try{
                          await DB.deleteQuestion(q.id);
                          await loadData(user.kurum_kodu,user);
                          toast_("Soru silindi 🗑");
                        }catch(err){toast_("Hata: "+err.message,true);}
                      }} style={{background:"#fee2e2",border:"none",borderRadius:7,padding:"4px 9px",
                        cursor:"pointer",color:"#ef4444",fontWeight:800,fontSize:12,flexShrink:0}}>🗑</button>
                    </div>
                  ))}
                </div>
              }
            </Card>

            <Card>
              <div style={{fontFamily:"'Baloo 2',sans-serif",fontWeight:800,fontSize:15,color:"#312e81",marginBottom:13}}>⚙️ Sistem</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
                <div style={{background:"#eef2ff",borderRadius:12,padding:"10px 14px",fontSize:13,fontWeight:700,color:"#4338ca",flex:1,minWidth:160}}>
                  🏫 {config.school_name||config.school||"Okul adı yok"}
                </div>
                <div style={{background:"#f0fdf4",borderRadius:12,padding:"10px 14px",fontSize:13,fontWeight:700,color:"#16a34a",flex:1,minWidth:160}}>
                  🔑 Kurum Kodu: {user.kurum_kodu||"—"}
                </div>
                <Btn label="🔄 Yenile" sz="sm" v="soft" onClick={()=>loadData(user.kurum_kodu,user)}/>
              </div>
            </Card>
          </div>
        )}

        {(tab==="feed"||tab==="mine")&&(
          <div style={{display:"grid",gridTemplateColumns:selQ&&window.innerWidth>=700?"minmax(260px,1fr) minmax(280px,1.15fr)":"1fr",gap:14,alignItems:"start"}}>
            <div style={{animation:"slideUp .28s ease",display:selQ&&window.innerWidth<700?"none":"block"}}>
              <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:13,flexWrap:"wrap"}}>
                <div style={{fontFamily:"'Baloo 2',sans-serif",fontSize:20,fontWeight:800,color:"#312e81"}}>
                  {tab==="mine"&&isT?"📌 Branşım":tab==="mine"?"📌 Sorularım":"🌊 Soru Havuzu"}
                </div>
                <div style={{background:"linear-gradient(135deg,#ede9fe,#e0e7ff)",color:"#6366f1",borderRadius:99,
                  padding:"3px 11px",fontSize:13,fontWeight:800}}>{filtQ.length}</div>
                {!isT&&<Btn label="+ Soru Sor" sz="sm" v="pink" onClick={()=>setTab("ask")} sx={{marginLeft:"auto"}}/>}
                <Btn label="🔄" sz="sm" v="soft" onClick={()=>loadData(user.kurum_kodu,user)} sx={{marginLeft:isT?"auto":"0"}}/>
              </div>
              <div style={{display:"flex",gap:7,marginBottom:12,flexWrap:"wrap"}}>
                <div style={{position:"relative",flex:1,minWidth:130}}>
                  <span style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",fontSize:13,pointerEvents:"none"}}>🔍</span>
                  <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Ara..."
                    style={{width:"100%",padding:"8px 11px 8px 32px",border:"2px solid #e8eeff",borderRadius:12,
                      fontSize:13,outline:"none",color:"#1e1b4b",background:"#fff",boxSizing:"border-box",fontWeight:600}}
                    onFocus={e=>e.target.style.borderColor="#6366f1"} onBlur={e=>e.target.style.borderColor="#e8eeff"}/>
                </div>
                <select value={fBranch} onChange={e=>setFBranch(e.target.value)}
                  style={{padding:"8px 11px",border:"2px solid #e8eeff",borderRadius:12,fontSize:12,
                    background:"#fff",cursor:"pointer",fontWeight:700,color:"#475569",outline:"none"}}>
                  <option value="">Tüm Branşlar</option>
                  {BRANCHES.map(b=><option key={b} value={b}>{BE[b]} {b}</option>)}
                </select>
                <select value={fStatus} onChange={e=>setFStatus(e.target.value)}
                  style={{padding:"8px 11px",border:"2px solid #e8eeff",borderRadius:12,fontSize:12,
                    background:"#fff",cursor:"pointer",fontWeight:700,color:"#475569",outline:"none"}}>
                  <option value="">Tüm Durum</option>
                  <option value="pending">⏳ Bekleyen</option>
                  <option value="answered">✅ Cevaplanan</option>
                </select>
              </div>
              <div style={{maxHeight:"calc(100vh - 240px)",overflowY:"auto",paddingRight:3}}>
                {filtQ.length===0
                  ?<div style={{textAlign:"center",padding:"36px 20px",color:"#c7d2fe"}}>
                    <div style={{fontSize:50,marginBottom:10,animation:"float 3s ease-in-out infinite",display:"inline-block"}}>🔍</div>
                    <div style={{fontWeight:800,fontSize:15,color:"#a5b4fc"}}>Soru bulunamadı</div>
                    <div style={{fontSize:13,marginTop:4}}>Filtreni değiştir veya yeni soru sor!</div>
                  </div>
                  :filtQ.map(q=><QCard key={q.id} q={q} sel={selQ?.id===q.id} onClick={openQ}/>)}
              </div>
            </div>

            {selQ&&(
              <div style={{background:"#fff",borderRadius:22,border:"2px solid #e0e7ff",
                boxShadow:"0 8px 36px rgba(99,102,241,.11)",
                maxHeight:window.innerWidth<700?"none":"calc(100vh - 125px)",
                display:"flex",flexDirection:"column",animation:"pop .22s ease",
                position:window.innerWidth<700?"relative":"sticky",
                top:window.innerWidth<700?0:74}}>
                {/* Mobil geri butonu */}
                {window.innerWidth<700&&(
                  <button onClick={()=>setSelQ(null)} style={{display:"flex",alignItems:"center",gap:6,
                    background:"none",border:"none",cursor:"pointer",padding:"10px 16px 4px",
                    color:"#6366f1",fontWeight:800,fontSize:14}}>
                    ← Listeye Dön
                  </button>
                )}
                <div style={{background:`linear-gradient(135deg,${BC[selQ.branch]||"#6366f1"}20,${BC[selQ.branch]||"#6366f1"}06)`,
                  padding:"14px 18px",borderBottom:"1.5px solid #e8eeff",display:"flex",alignItems:"center",
                  justifyContent:"space-between",gap:8,flexWrap:"wrap",borderRadius:"20px 20px 0 0",flexShrink:0}}>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                    <BPill branch={selQ.branch}/>
                    {selQ.answers.length===0
                      ?<Tag label="Bekliyor" color="#f59e0b" emoji="⏳"/>
                      :<Tag label={`${selQ.answers.length} Cevap`} color="#10b981" emoji="✅"/>}
                    {selQ.cls&&<Tag label={selQ.cls} color="#6366f1" emoji="📚"/>}
                  </div>
                  <button onClick={()=>setSelQ(null)} style={{background:"#f0f4ff",border:"none",borderRadius:9,
                    width:28,height:28,cursor:"pointer",color:"#6366f1",fontWeight:800,fontSize:13,
                    display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                </div>
                <div style={{padding:18,overflowY:"auto",flex:1}}>
                  <div style={{display:"flex",gap:9,alignItems:"center",marginBottom:12}}>
                    <Ava i={selQ.sName.split(" ").map(w=>w[0]).join("")} c={selQ.sCol||"#6366f1"} s={38} ring photo={selQ.sPhoto}/>
                    <div>
                      <div style={{fontWeight:800,fontSize:14,color:"#1e1b4b"}}>{selQ.sName}</div>
                      <div style={{fontSize:11,color:"#a5b4fc",fontWeight:600}}>🕐 {ago(selQ.ts)} · 👁 {selQ.views}</div>
                    </div>
                  </div>
                  <div style={{background:"linear-gradient(135deg,#f8faff,#eef2ff)",borderRadius:14,
                    padding:14,marginBottom:14,border:"1.5px solid #e0e7ff"}}>
                    <p style={{margin:0,fontSize:14,color:"#1e1b4b",lineHeight:1.7}}>{selQ.text}</p>
                  </div>
                  {selQ.img&&<img src={selQ.img} style={{maxWidth:"100%",borderRadius:12,border:"2px solid #e0e7ff",marginBottom:14}} alt=""/>}
                  <div style={{fontWeight:800,fontSize:14,color:"#312e81",marginBottom:8}}>💡 Cevaplar ({selQ.answers.length})</div>
                  {selQ.answers.length===0&&(
                    <div style={{textAlign:"center",padding:18,background:"#f8faff",borderRadius:14,color:"#a5b4fc"}}>
                      <div style={{fontSize:34,animation:"float 3s ease-in-out infinite",display:"inline-block",marginBottom:5}}>💭</div>
                      <div style={{fontWeight:700,fontSize:13}}>Henüz cevap yok</div>
                    </div>
                  )}
                  {selQ.answers.map(a=><ABubble key={a.id} a={a}/>)}
                  {isT&&(user?.is_admin||myBr.includes(selQ.branch)||tab==="feed")&&(
                    <Btn label="✏️ Cevap Ver" onClick={()=>setShowAns(true)} full sz="lg" v="green" sx={{marginTop:14}}/>
                  )}
                </div>
              </div>
            )}
          </div>
        )}
      </main>

      {/* BİLDİRİMLER */}
      <Modal open={showNotif} onClose={()=>setShowNotif(false)} title="🔔 Bildirimler" w={400}>
        {notifs.length===0
          ?<div style={{textAlign:"center",padding:20,color:"#c7d2fe"}}>
            <div style={{fontSize:46,marginBottom:8,animation:"float 3s ease-in-out infinite",display:"inline-block"}}>🔕</div>
            <div style={{fontWeight:700}}>Bildirim yok</div>
          </div>
          :notifs.map(n=>(
            <div key={n.id} onClick={async()=>{
              const q=questions.find(q=>q.id===n.q_id);
              if(q){openQ(q);setTab("mine");}
              await DB.markNotifRead(n.id);
              setNotifs(prev=>prev.map(x=>x.id===n.id?{...x,read:true}:x));
              setShowNotif(false);
            }}
              style={{padding:"11px 13px",borderRadius:13,marginBottom:7,
                background:n.read?"#f8faff":"linear-gradient(135deg,#eef2ff,#f5f3ff)",
                border:`1.5px solid ${n.read?"#f0f4ff":"#c4b5fd"}`,cursor:"pointer",transition:"all .2s"}}
              onMouseEnter={e=>e.currentTarget.style.transform="translateX(4px)"}
              onMouseLeave={e=>e.currentTarget.style.transform="none"}>
              <div style={{fontWeight:700,fontSize:13,color:"#312e81"}}>{n.text}</div>
              <div style={{fontSize:11,color:"#a5b4fc",marginTop:2,fontWeight:600}}>🕐 {ago(n.ts)}</div>
            </div>
          ))}
      </Modal>

      {/* CEVAP VER */}
      <Modal open={showAns} onClose={()=>setShowAns(false)} title="✏️ Cevap Ver" w={580}>
        <div style={{display:"flex",gap:5,marginBottom:15,background:"#f0f4ff",borderRadius:13,padding:4}}>
          {[{id:"text",l:"📝 Yazı"},{id:"photo",l:"📷 Fotoğraf"},{id:"draw",l:"🎨 Çizim"},{id:"audio",l:"🎙 Ses"}].map(t=>(
            <button key={t.id} onClick={()=>setAnsTab(t.id)}
              style={{flex:1,padding:8,borderRadius:10,border:"none",
                background:ansTab===t.id?"#fff":"transparent",
                color:ansTab===t.id?"#6366f1":"#94a3b8",fontWeight:800,cursor:"pointer",
                transition:"all .2s",fontSize:13,
                boxShadow:ansTab===t.id?"0 2px 10px rgba(99,102,241,.14)":"none"}}>
              {t.l}
            </button>
          ))}
        </div>
        {ansTab==="text"&&(
          <textarea value={ansF.text} onChange={e=>setAnsF(f=>({...f,text:e.target.value}))}
            placeholder="Çözümünüzü yazın..." rows={6}
            style={{width:"100%",padding:"12px 13px",border:"2px solid #e8eeff",borderRadius:13,
              fontSize:14,resize:"vertical",outline:"none",color:"#1e1b4b",background:"#f8faff",boxSizing:"border-box"}}
            onFocus={e=>e.target.style.borderColor="#6366f1"} onBlur={e=>e.target.style.borderColor="#e8eeff"}/>
        )}
        {ansTab==="photo"&&(
          <div>
            <AskPhotoButtons onFile={f=>imgUpFile(f,"ans")} size="lg"/>
            {ansF.img
              ?<div style={{position:"relative",marginTop:4}}>
                <img src={ansF.img} style={{maxWidth:"100%",maxHeight:300,borderRadius:12,border:"2px solid #c7d2fe",display:"block"}} alt=""/>
                <button onClick={()=>setAnsF(f=>({...f,img:null}))} style={{position:"absolute",top:8,right:8,
                  background:"#ef4444",color:"#fff",border:"none",borderRadius:"50%",width:26,height:26,
                  cursor:"pointer",fontSize:13,fontWeight:800}}>✕</button>
                <div style={{marginTop:6,fontSize:12,color:"#10b981",fontWeight:700}}>✅ Hazır — aşağıdan gönderin</div>
              </div>
              :<div style={{textAlign:"center",padding:16,color:"#a5b4fc",fontSize:13,fontWeight:600,background:"#f8faff",borderRadius:12,marginTop:4}}>
                Kağıt üzerinde çözdüğünüz soruyu fotoğraflayıp gönderebilirsiniz 📄✏️
              </div>}
          </div>
        )}
        {ansTab==="draw"&&<DrawCanvas imgUrl={selQ?.img} onSave={d=>setAnsF(f=>({...f,img:d}))}/>}
        {ansTab==="audio"&&(
          <div style={{textAlign:"center",padding:"18px 0"}}>
            <div style={{fontSize:54,marginBottom:14,display:"inline-block",
              animation:rec?"wiggle .5s ease-in-out infinite":"float 3s ease-in-out infinite"}}>🎙</div>
            {!rec
              ?<Btn label="🔴 Kaydı Başlat" onClick={startRec} sz="lg" v="pink"/>
              :<div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:13,
                  background:"#fff1f5",borderRadius:12,padding:"9px 18px",color:"#e11d48",fontWeight:700,
                  fontSize:14,border:"1.5px solid #fecdd3"}}>
                  <div style={{width:9,height:9,background:"#ef4444",borderRadius:"50%",animation:"pulseR 1s ease infinite"}}/>
                  Kaydediliyor...
                </div>
                <Btn label="⏹ Durdur" onClick={stopRec} v="danger" sz="lg"/>
              </div>}
            {ansF.audio&&(
              <div style={{marginTop:14,background:"#f0fdf4",borderRadius:12,padding:12,border:"1.5px solid #86efac"}}>
                <div style={{fontSize:13,color:"#10b981",fontWeight:800,marginBottom:5}}>✅ Hazır!</div>
                <audio controls src={ansF.audio} style={{width:"100%"}}/>
              </div>
            )}
          </div>
        )}
        <div style={{display:"flex",gap:9,marginTop:16,justifyContent:"flex-end"}}>
          <Btn label="İptal" v="ghost" onClick={()=>setShowAns(false)}/>
          <Btn label="📤 Gönder" onClick={answer} sz="lg" v="green"/>
        </div>
      </Modal>

      <Toast/><LoadingOverlay/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<!-- PWA INSTALL PROMPT -->
<div id="pwaInstallBar" style="display:none;position:fixed;bottom:0;left:0;right:0;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;padding:14px 18px;
  z-index:9999;display:none;align-items:center;justify-content:space-between;
  box-shadow:0 -4px 24px rgba(99,102,241,.35);gap:12px;flex-wrap:wrap;">
  <div style="display:flex;align-items:center;gap:10px;">
    <span style="font-size:26px;">📚</span>
    <div>
      <div style="font-weight:800;font-size:14px;">Ana Ekrana Ekle</div>
      <div style="font-size:12px;opacity:.85;">Soru Sor uygulamasını yükle</div>
    </div>
  </div>
  <div style="display:flex;gap:8px;">
    <button id="pwaInstallBtn" style="background:#fff;color:#6366f1;border:none;border-radius:10px;
      padding:9px 18px;font-weight:800;font-size:13px;cursor:pointer;">📲 Yükle</button>
    <button id="pwaCloseBtn" style="background:rgba(255,255,255,.2);color:#fff;border:none;
      border-radius:10px;padding:9px 14px;font-weight:700;font-size:13px;cursor:pointer;">✕</button>
  </div>
</div>

<script>
// PWA Install Prompt
let deferredPrompt = null;
const bar = document.getElementById('pwaInstallBar');

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  bar.style.display = 'flex';
});

document.getElementById('pwaInstallBtn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  bar.style.display = 'none';
});

document.getElementById('pwaCloseBtn').addEventListener('click', () => {
  bar.style.display = 'none';
});

window.addEventListener('appinstalled', () => {
  bar.style.display = 'none';
  deferredPrompt = null;
});

// Service Worker kaydet
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
